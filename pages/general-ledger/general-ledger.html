<div data-page-has-title="true" class="space-y-6">
  <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-4">
    <div>
      <h2 class="text-3xl font-bold text-slate-800">General Ledger</h2>
      <p class="text-slate-500 mt-1">
        Rekapan seluruh transaksi dari input jurnal
      </p>
    </div>

    <div class="w-full md:w-56">
      <label for="glTahun" class="block mb-2 text-sm font-semibold text-slate-700">
        Tahun
      </label>

      <select id="glTahun" placeholder="Pilih Tahun">
      </select>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
    <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm">
      <div class="text-sm text-slate-500">Total Baris</div>
      <div id="glTotalBaris" class="text-2xl font-bold text-slate-800 mt-1">0</div>
    </div>

    <div class="bg-green-50 border border-green-200 rounded-2xl p-4 shadow-sm">
      <div class="text-sm text-green-700">Total Debet</div>
      <div id="glTotalDebet" class="text-2xl font-bold text-green-700 mt-1">Rp 0</div>
    </div>

    <div class="bg-red-50 border border-red-200 rounded-2xl p-4 shadow-sm">
      <div class="text-sm text-red-700">Total Kredit</div>
      <div id="glTotalKredit" class="text-2xl font-bold text-red-700 mt-1">Rp 0</div>
    </div>

    <div class="bg-blue-50 border border-blue-200 rounded-2xl p-4 shadow-sm">
      <div class="text-sm text-blue-700">Net</div>
      <div id="glTotalNet" class="text-2xl font-bold text-blue-700 mt-1">Rp 0</div>
    </div>
  </div>

  <div class="px-5 py-4 border-b border-slate-200 sticky top-0 z-20 bg-white/95 backdrop-blur">
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
      <div>
        <h3 class="text-lg font-semibold text-slate-800">Data General Ledger</h3>
        <p class="text-sm text-slate-500 mt-1">
          Menampilkan seluruh detail jurnal pada tahun terpilih
        </p>
      </div>

      <div id="glBulkActionBar" class="hidden flex flex-wrap items-center gap-2">
        <span id="glSelectedCounter" class="hidden px-3 h-10 rounded-xl bg-blue-50 text-blue-700 font-semibold text-sm items-center">
          0 dipilih
        </span>

        <button id="glSelectAllBtn" type="button" class="px-4 h-10 rounded-xl border border-slate-300 bg-white text-slate-700 font-semibold hover:bg-slate-50">
          Pilih Semua
        </button>

        <button id="glDeleteSelectedBtn" type="button" class="hidden px-4 h-10 rounded-xl bg-red-600 text-white font-semibold hover:bg-red-700">
          Hapus Terpilih
        </button>

        <button id="glDeleteAllBtn" type="button" class="px-4 h-10 rounded-xl bg-slate-700 text-white font-semibold hover:bg-slate-800">
          Hapus Semua Tahun Ini
        </button>
      </div>
    </div>
  </div>

    <div class="p-4">
      <div class="table-responsive rounded-xl border border-slate-200">
        <table class="min-w-full text-sm text-slate-700">
          <thead class="bg-slate-100 text-slate-700">
            <tr>
              <th class="px-4 py-3 text-center font-semibold whitespace-nowrap w-12">
                <input id="glCheckAll" type="checkbox">
              </th>
              <th class="px-4 py-3 text-left font-semibold whitespace-nowrap">No</th>
              <th class="px-4 py-3 text-left font-semibold whitespace-nowrap">Tanggal</th>
              <th class="px-4 py-3 text-left font-semibold whitespace-nowrap">Kode COA</th>
              <th class="px-4 py-3 text-left font-semibold whitespace-nowrap">Nama COA</th>
              <th class="px-4 py-3 text-left font-semibold whitespace-nowrap">Vendor</th>
              <th class="px-4 py-3 text-left font-semibold whitespace-nowrap">Keterangan</th>
              <th class="px-4 py-3 text-right font-semibold whitespace-nowrap">Debet</th>
              <th class="px-4 py-3 text-right font-semibold whitespace-nowrap">Kredit</th>
              <th class="px-4 py-3 text-right font-semibold whitespace-nowrap">NET</th>
            </tr>
          </thead>
          <tbody id="generalLedgerTable" class="divide-y divide-slate-200">
            <tr>
              <td colspan="10" class="px-4 py-6 text-center text-slate-400">
                Loading...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
