<div data-page-has-title="true" class="space-y-6">
  <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-4 no-print">
    <div>
      <h2 class="text-3xl font-bold text-slate-800">Neraca Tahunan</h2>
      <p class="text-slate-500 mt-1">
        Laporan neraca tahunan siap print
      </p>
    </div>

    <div class="flex flex-col md:flex-row gap-3">
      <div class="w-full md:w-48">
        <label class="block mb-2 text-sm font-semibold text-slate-700">Tahun</label>
        <select id="neracaTahunanTahun"></select>
      </div>

      <div class="relative mb-4 no-print">
        <button
          id="neracaTahunanExportBtn"
          type="button"
          class="btn-primary px-4 flex items-center gap-2"
          onclick="event.stopPropagation(); toggleNeracaTahunanExportMenu()"
        >
          <span>Export</span>
          <span class="text-sm">▾</span>
        </button>

        <div
          id="neracaTahunanExportMenu"
          class="hidden absolute right-0 mt-2 w-44 bg-white border border-slate-200 rounded-xl shadow-lg overflow-hidden z-50"
        >
          <button
            type="button"
            class="export-dropdown-item"
            onclick="event.stopPropagation(); handleNeracaTahunanExport('print')"
          >
            Print
          </button>

          <button
            type="button"
            class="export-dropdown-item"
            onclick="event.stopPropagation(); handleNeracaTahunanExport('pdf')"
          >
            PDF
          </button>

          <button
            type="button"
            class="export-dropdown-item"
            onclick="event.stopPropagation(); handleNeracaTahunanExport('xlsx')"
          >
            XLSX
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="overflow-x-auto">
    <div
      id="neracaTahunanPrintArea"
      class="min-w-[1100px] bg-white border border-slate-200 rounded-2xl shadow-sm overflow-visible print:overflow-visible print:shadow-none print:border-0 print:rounded-none"
    >
      <div class="p-8 print:p-0">
        <div class="text-center mb-8">
          <h1 id="neracaCompanyName" class="text-2xl font-bold text-slate-900">Nama Perusahaan</h1>

          <div class="mt-3 inline-block bg-blue-700 text-white font-bold px-8 py-2 rounded-md uppercase tracking-wide">
            Neraca
          </div>

          <p id="neracaTahunanPeriode" class="mt-3 text-slate-700">
            Per 31 Desember 2026
          </p>
        </div>

        <div id="neracaTahunanGrid" class="grid grid-cols-2 gap-10 items-start">
          <!-- KIRI -->
          <div>
            <table class="w-full text-sm text-slate-800">
              <tbody id="neracaTahunanLeftBody">
                <tr>
                  <td class="py-6 text-center text-slate-400">Loading...</td>
                </tr>
              </tbody>
            </table>
          </div>

          <!-- KANAN -->
          <div>
            <table class="w-full text-sm text-slate-800">
              <tbody id="neracaTahunanRightBody">
                <tr>
                  <td class="py-6 text-center text-slate-400">Loading...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
